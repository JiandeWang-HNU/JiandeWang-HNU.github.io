{{- define "main" -}}

{{ partial "page_header.html" . }}

<div class="universal-wrapper mt-5 page-research">
  {{ with .Content }}
    <div class="article-style">{{ . }}</div>
  {{ end }}



  <div class="research-list-wrap">
      {{ range $index, $item := .Params.research_list }}

        <div class="research-item r-index{{$index}} row align-items-center">

          <div class="col-12 col-md-6 r-img">
            <img alt="" src="{{ $item.image | relURL }}"/>
          </div>

          <div class="col-12 col-md-6 rc-wrap">
            <div class="r-title">{{$item.title | markdownify}}</div>
            <div class="r-content">{{$item.content | markdownify}}</div>
          </div>


        </div>

      {{ end }}
  </div>




</div>

{{- end -}}
